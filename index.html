<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hard Mode Labyrinth</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; margin: auto; }
        #ui { position: absolute; top: 10px; left: 10px; pointer-events: none; z-index: 10; }
        .lvl-text { font-size: 18px; color: #ff3300; font-weight: bold; text-shadow: 0 0 10px rgba(255,51,0,0.5); }
        #minimap { position: absolute; top: 10px; right: 10px; width: 110px; height: 110px; border: 2px solid #ff3300; background: rgba(0,0,0,0.9); z-index: 20; pointer-events: none; }
        #zoom-ctrl { position: absolute; bottom: 20px; left: 20px; display: flex; flex-direction: column; gap: 12px; z-index: 30; }
        .z-btn { width: 55px; height: 55px; background: rgba(255,255,255,0.05); border: 2px solid #ff3300; color: #ff3300; border-radius: 12px; font-size: 28px; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(8px); pointer-events: auto; }
    </style>
</head>
<body>
    <div id="ui"><div class="lvl-text" id="lvl">HARD MODE: Level 1</div></div>
    <canvas id="minimap"></canvas>
    <div id="zoom-ctrl">
        <div class="z-btn" id="z-in" ontouchstart="adjustZoom(0.2)">+</div>
        <div class="z-btn" id="z-out" ontouchstart="adjustZoom(-0.2)">−</div>
    </div>
    <canvas id="mazeCanvas"></canvas>

    <script>
        const canvas = document.getElementById('mazeCanvas');
        const ctx = canvas.getContext('2d');
        const mCanvas = document.getElementById('minimap');
        const mCtx = mCanvas.getContext('2d');

        let rows, cols, cellSize, grid, goal;
        let level = 1, p = { x: 0, y: 0 };
        let moveDir = { dr: 0, dc: 0 };
        let touchStart = null, zoom = 1.2; 

        function adjustZoom(val) { zoom = Math.max(0.4, Math.min(3.5, zoom + val)); }

        window.addEventListener('touchstart', (e) => {
            if (e.target.classList.contains('z-btn')) return;
            touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        });

        window.addEventListener('touchmove', (e) => {
            if (!touchStart) return;
            e.preventDefault();
            const dx = e.touches[0].clientX - touchStart.x;
            const dy = e.touches[0].clientY - touchStart.y;
            if (Math.sqrt(dx*dx + dy*dy) > 8) {
                if (Math.abs(dx) > Math.abs(dy)) moveDir = { dr: 0, dc: dx > 0 ? 1 : -1 };
                else moveDir = { dr: dy > 0 ? 1 : -1, dc: 0 };
            }
        }, {passive: false});

        window.addEventListener('touchend', () => { touchStart = null; moveDir = { dr: 0, dc: 0 }; });

        function setup() {
            // Faster scaling of complexity
            rows = 12 + (level * 3); 
            cols = rows;
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            cellSize = 70;
            
            grid = [];
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) grid.push({r, c, walls: [true,true,true,true], v: false});
            }
            
            // PRIM'S ALGORITHM for harder complexity
            generateHardMaze();
            
            p.x = cellSize * 0.5; p.y = cellSize * 0.5;
            goal = { r: rows-1, c: cols-1 };
            document.getElementById('lvl').innerText = "HARD MODE: Lvl " + level;
        }

        function generateHardMaze() {
            let walls = [];
            let startCell = grid[0];
            startCell.v = true;
            addWalls(startCell, walls);

            while (walls.length > 0) {
                let randomIndex = Math.floor(Math.random() * walls.length);
                let {a, b, dir} = walls[randomIndex];
                
                if (!b.v) {
                    a.walls[dir] = false;
                    b.walls[(dir + 2) % 4] = false;
                    b.v = true;
                    addWalls(b, walls);
                }
                walls.splice(randomIndex, 1);
            }
        }

        function addWalls(cell, walls) {
            let r = cell.r, c = cell.c;
            if (r > 0) walls.push({a: cell, b: grid[c + (r-1)*cols], dir: 0});
            if (c < cols-1) walls.push({a: cell, b: grid[(c+1) + r*cols], dir: 1});
            if (r < rows-1) walls.push({a: cell, b: grid[c + (r+1)*cols], dir: 2});
            if (c > 0) walls.push({a: cell, b: grid[(c-1) + r*cols], dir: 3});
        }

        function moveTick() {
            if (moveDir.dr !== 0 || moveDir.dc !== 0) {
                let curR = Math.floor(p.y / cellSize);
                let curC = Math.floor(p.x / cellSize);
                let cell = grid[curC + curR * cols];
                let speed = 8.5; 
                let nextX = p.x + moveDir.dc * speed;
                let nextY = p.y + moveDir.dr * speed;
                let b = 18; 
                let wallIdx = moveDir.dr===-1?0 : moveDir.dc===1?1 : moveDir.dr===1?2 : 3;

                let canMove = true;
                if (cell && cell.walls[wallIdx]) {
                    if (moveDir.dc === 1 && nextX > (curC + 1) * cellSize - b) canMove = false;
                    if (moveDir.dc === -1 && nextX < curC * cellSize + b) canMove = false;
                    if (moveDir.dr === 1 && nextY > (curR + 1) * cellSize - b) canMove = false;
                    if (moveDir.dr === -1 && nextY < curR * cellSize + b) canMove = false;
                }
                
                if (canMove) { p.x = nextX; p.y = nextY; }
                if (curR === goal.r && curC === goal.c) { level++; setup(); }
            }
            draw();
            drawMinimap();
            requestAnimationFrame(moveTick);
        }

        function draw() {
            ctx.setTransform(1,0,0,1,0,0);
            ctx.fillStyle = "#000"; ctx.fillRect(0,0,canvas.width,canvas.height);
            let camX = -p.x * zoom + canvas.width / 2;
            let camY = -p.y * zoom + canvas.height / 2;
            ctx.setTransform(zoom, 0, 0, zoom, camX, camY);
            ctx.strokeStyle = "#ff3300"; ctx.lineWidth = 5; // Red Walls for Hard Mode
            grid.forEach(c => {
                let x = c.c*cellSize, y = c.r*cellSize;
                if(c.walls[0]) line(x,y,x+cellSize,y); if(c.walls[1]) line(x+cellSize,y,x+cellSize,y+cellSize);
                if(c.walls[2]) line(x+cellSize,y+cellSize,x,y+cellSize); if(c.walls[3]) line(x,y+cellSize,x,y);
            });
            ctx.fillStyle = "#ffde00"; ctx.fillRect(goal.c*cellSize+cellSize*0.2, goal.r*cellSize+cellSize*0.2, cellSize*0.6, cellSize*0.6);
            ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(p.x, p.y, 18, 0, 7); ctx.fill();
        }

        function drawMinimap() {
            mCtx.fillStyle = "#000"; mCtx.fillRect(0,0,110,110);
            let mSize = 110 / cols; mCtx.strokeStyle = "#661100"; mCtx.lineWidth = 1;
            grid.forEach(c => {
                let x = c.c*mSize, y = c.r*mSize;
                if(c.walls[0]) { mCtx.beginPath(); mCtx.moveTo(x,y); mCtx.lineTo(x+mSize,y); mCtx.stroke(); }
                if(c.walls[1]) { mCtx.beginPath(); mCtx.moveTo(x+mSize,y); mCtx.lineTo(x+mSize,y+mSize); mCtx.stroke(); }
                if(c.walls[2]) { mCtx.beginPath(); mCtx.moveTo(x+mSize,y+mSize); mCtx.lineTo(x,y+mSize); mCtx.stroke(); }
                if(c.walls[3]) { mCtx.beginPath(); mCtx.moveTo(x,y+mSize); mCtx.lineTo(x,y); mCtx.stroke(); }
            });
            mCtx.fillStyle = "#ff3300"; mCtx.fillRect((p.x/(cols*cellSize))*110-2, (p.y/(rows*cellSize))*110-2, 4, 4);
        }

        function line(x1,y1,x2,y2){ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();}

        setup();
        moveTick();
    </script>
</body>
</html>
