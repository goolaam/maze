<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zoom Labyrinth</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; margin: auto; }
        #ui { position: absolute; top: 10px; left: 10px; pointer-events: none; z-index: 10; }
        .lvl-text { font-size: 18px; color: #00d2ff; font-weight: bold; }
        
        #minimap {
            position: absolute; top: 10px; right: 10px;
            width: 100px; height: 100px;
            border: 2px solid #0066ff; background: rgba(0,0,0,0.9);
            z-index: 20; pointer-events: none;
        }

        #zoom-ctrl {
            position: absolute; bottom: 20px; left: 20px;
            display: flex; flex-direction: column; gap: 10px; z-index: 30;
        }
        .z-btn {
            width: 50px; height: 50px; background: rgba(255,255,255,0.1);
            border: 1px solid #0066ff; color: #0066ff; border-radius: 10px;
            font-size: 24px; display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(5px); pointer-events: auto;
        }
    </style>
</head>
<body>
    <div id="ui"><div class="lvl-text" id="lvl">Level 1</div></div>
    <canvas id="minimap"></canvas>
    
    <div id="zoom-ctrl">
        <div class="z-btn" id="z-in">+</div>
        <div class="z-btn" id="z-out">−</div>
    </div>

    <canvas id="mazeCanvas"></canvas>

    <script>
        const canvas = document.getElementById('mazeCanvas');
        const ctx = canvas.getContext('2d');
        const mCanvas = document.getElementById('minimap');
        const mCtx = mCanvas.getContext('2d');

        let rows, cols, cellSize, grid, goal;
        let level = 1, p = { x: 0, y: 0 };
        let moveDir = { dr: 0, dc: 0 };
        let touchStart = null;
        let zoom = 1.0; 

        // Zoom Listeners
        document.getElementById('z-in').addEventListener('touchstart', (e) => { e.stopPropagation(); zoom = Math.min(zoom + 0.2, 3.0); });
        document.getElementById('z-out').addEventListener('touchstart', (e) => { e.stopPropagation(); zoom = Math.max(zoom - 0.2, 0.5); });

        window.addEventListener('touchstart', (e) => {
            touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        });

        window.addEventListener('touchmove', (e) => {
            if (!touchStart) return;
            e.preventDefault();
            const dx = e.touches[0].clientX - touchStart.x;
            const dy = e.touches[0].clientY - touchStart.y;
            if (Math.sqrt(dx*dx + dy*dy) > 10) {
                if (Math.abs(dx) > Math.abs(dy)) moveDir = { dr: 0, dc: dx > 0 ? 1 : -1 };
                else moveDir = { dr: dy > 0 ? 1 : -1, dc: 0 };
            }
        }, {passive: false});

        window.addEventListener('touchend', () => { touchStart = null; moveDir = { dr: 0, dc: 0 }; });

        function setup() {
            rows = 10 + (level * 2); cols = rows;
            const size = Math.min(window.innerWidth, window.innerHeight);
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            cellSize = 60; // Fixed physical cell size, zoom handles scaling
            
            grid = [];
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) grid.push({r, c, walls: [true,true,true,true], v: false});
            }
            generate(grid[0]);
            
            p.x = cellSize * 0.5; p.y = cellSize * 0.5;
            goal = { r: rows-1, c: cols-1 };
            document.getElementById('lvl').innerText = "Level " + level;
        }

        function generate(curr) {
            let stack = []; curr.v = true; stack.push(curr);
            while (stack.length > 0) {
                let c = stack[stack.length-1], n = [];
                [[c.r-1,c.c,0,2],[c.r,c.c+1,1,3],[c.r+1,c.c,2,0],[c.r,c.c-1,3,1]].forEach(d => {
                    let neighbor = grid[d[1] + d[0]*cols];
                    if(d[0]>=0 && d[0]<rows && d[1]>=0 && d[1]<cols && !neighbor.v) n.push({cell:neighbor, dw:d[2], nw:d[3]});
                });
                if (n.length > 0) {
                    let choice = n[Math.floor(Math.random()*n.length)];
                    c.walls[choice.dw] = false; choice.cell.walls[choice.nw] = false;
                    choice.cell.v = true; stack.push(choice.cell);
                } else stack.pop();
            }
        }

        function moveTick() {
            if (moveDir.dr !== 0 || moveDir.dc !== 0) {
                let curR = Math.floor(p.y / cellSize);
                let curC = Math.floor(p.x / cellSize);
                let cell = grid[curC + curR * cols];
                let speed = 4;
                let nextX = p.x + moveDir.dc * speed;
                let nextY = p.y + moveDir.dr * speed;
                let b = 12; // Buffer
                let wallIdx = moveDir.dr===-1?0 : moveDir.dc===1?1 : moveDir.dr===1?2 : 3;

                let canMove = true;
                if (cell.walls[wallIdx]) {
                    if (moveDir.dc === 1 && nextX > (curC + 1) * cellSize - b) canMove = false;
                    if (moveDir.dc === -1 && nextX < curC * cellSize + b) canMove = false;
                    if (moveDir.dr === 1 && nextY > (curR + 1) * cellSize - b) canMove = false;
                    if (moveDir.dr === -1 && nextY < curR * cellSize + b) canMove = false;
                }
                if (canMove) { p.x = nextX; p.y = nextY; }
                if (curR === goal.r && curC === goal.c) { level++; setup(); }
            }
            draw();
            drawMinimap();
            requestAnimationFrame(moveTick);
        }

        function draw() {
            ctx.setTransform(1,0,0,1,0,0);
            ctx.fillStyle = "#000"; ctx.fillRect(0,0,canvas.width,canvas.height);

            // Camera follow
            let camX = -p.x * zoom + canvas.width / 2;
            let camY = -p.y * zoom + canvas.height / 2;
            ctx.setTransform(zoom, 0, 0, zoom, camX, camY);

            ctx.strokeStyle = "#0066ff"; ctx.lineWidth = 4;
            grid.forEach(c => {
                let x = c.c*cellSize, y = c.r*cellSize;
                if(c.walls[0]) line(x,y,x+cellSize,y); if(c.walls[1]) line(x+cellSize,y,x+cellSize,y+cellSize);
                if(c.walls[2]) line(x+cellSize,y+cellSize,x,y+cellSize); if(c.walls[3]) line(x,y+cellSize,x,y);
            });

            ctx.fillStyle = "#ffde00"; ctx.fillRect(goal.c*cellSize+cellSize*0.2, goal.r*cellSize+cellSize*0.2, cellSize*0.6, cellSize*0.6);
            ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(p.x, p.y, 15, 0, 7); ctx.fill();
        }

        function drawMinimap() {
            mCtx.fillStyle = "#000"; mCtx.fillRect(0,0,100,100);
            let mSize = 100 / cols; mCtx.strokeStyle = "#0044aa"; mCtx.lineWidth = 0.5;
            grid.forEach(c => {
                let x = c.c*mSize, y = c.r*mSize;
                if(c.walls[0]) { mCtx.beginPath(); mCtx.moveTo(x,y); mCtx.lineTo(x+mSize,y); mCtx.stroke(); }
                if(c.walls[1]) { mCtx.beginPath(); mCtx.moveTo(x+mSize,y); mCtx.lineTo(x+mSize,y+mSize); mCtx.stroke(); }
                if(c.walls[2]) { mCtx.beginPath(); mCtx.moveTo(x+mSize,y+mSize); mCtx.lineTo(x,y+mSize); mCtx.stroke(); }
                if(c.walls[3]) { mCtx.beginPath(); mCtx.moveTo(x,y+mSize); mCtx.lineTo(x,y); mCtx.stroke(); }
            });
            mCtx.fillStyle = "#fff";
            mCtx.fillRect((p.x/(cols*cellSize))*100-1, (p.y/(rows*cellSize))*100-1, 3, 3);
        }

        function line(x1,y1,x2,y2){ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();}

        setup();
        moveTick();
    </script>
</body>
</html>
