<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Precision Maze Explorer</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; margin: auto; }
        #ui { position: absolute; top: 10px; left: 10px; pointer-events: none; z-index: 10; }
        .lvl-text { font-size: 18px; color: #00d2ff; font-weight: bold; }
        
        /* Mini Map Style */
        #minimap {
            position: absolute; top: 10px; right: 10px;
            width: 80px; height: 80px;
            border: 1px solid #0066ff; background: rgba(0,0,0,0.8);
            z-index: 20; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="ui"><div class="lvl-text" id="lvl">Level 1</div></div>
    <canvas id="minimap"></canvas>
    <canvas id="mazeCanvas"></canvas>

    <script>
        const canvas = document.getElementById('mazeCanvas');
        const ctx = canvas.getContext('2d');
        const mCanvas = document.getElementById('minimap');
        const mCtx = mCanvas.getContext('2d');

        let rows, cols, cellSize, grid, goal;
        let level = 1, p = { r: 0, c: 0, x: 0, y: 0 };
        let moveDir = { dr: 0, dc: 0 };
        let touchStart = null;

        window.addEventListener('touchstart', (e) => {
            touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        });

        window.addEventListener('touchmove', (e) => {
            if (!touchStart) return;
            e.preventDefault();
            const dx = e.touches[0].clientX - touchStart.x;
            const dy = e.touches[0].clientY - touchStart.y;
            const dist = Math.sqrt(dx*dx + dy*dy);

            if (dist > 10) { 
                if (Math.abs(dx) > Math.abs(dy)) {
                    moveDir = { dr: 0, dc: dx > 0 ? 1 : -1 };
                } else {
                    moveDir = { dr: dy > 0 ? 1 : -1, dc: 0 };
                }
            }
        }, {passive: false});

        window.addEventListener('touchend', () => {
            touchStart = null;
            moveDir = { dr: 0, dc: 0 }; // Stop moving immediately
        });

        function setup() {
            rows = 10 + (level * 2); 
            cols = rows;
            const size = Math.min(window.innerWidth, window.innerHeight) * 0.95;
            canvas.width = size; canvas.height = size;
            cellSize = size / cols;
            
            grid = [];
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) grid.push({r, c, walls: [true,true,true,true], v: false});
            }
            generate(grid[0]);
            
            p.r = 0; p.c = 0;
            p.x = cellSize/2; p.y = cellSize/2;
            goal = { r: rows-1, c: cols-1 };

            document.getElementById('lvl').innerText = "Level " + level;
            draw();
        }

        function generate(curr) {
            let stack = []; curr.v = true; stack.push(curr);
            while (stack.length > 0) {
                let c = stack[stack.length-1], n = [];
                [[c.r-1,c.c,0,2],[c.r,c.c+1,1,3],[c.r+1,c.c,2,0],[c.r,c.c-1,3,1]].forEach(d => {
                    let neighbor = grid[d[1] + d[0]*cols];
                    if(d[0]>=0 && d[0]<rows && d[1]>=0 && d[1]<cols && !neighbor.v) n.push({cell:neighbor, dw:d[2], nw:d[3]});
                });
                if (n.length > 0) {
                    let choice = n[Math.floor(Math.random()*n.length)];
                    c.walls[choice.dw] = false; choice.cell.walls[choice.nw] = false;
                    choice.cell.v = true; stack.push(choice.cell);
                } else stack.pop();
            }
        }

        function moveTick() {
            if (moveDir.dr !== 0 || moveDir.dc !== 0) {
                let currentR = Math.floor(p.y / cellSize);
                let currentC = Math.floor(p.x / cellSize);
                let cell = grid[currentC + currentR * cols];
                
                let speed = cellSize * 0.15; // Movement speed relative to maze size
                let nextX = p.x + moveDir.dc * speed;
                let nextY = p.y + moveDir.dr * speed;

                // Collision Logic
                let b = cellSize * 0.2; // Buffer
                let wallIdx = moveDir.dr===-1?0 : moveDir.dc===1?1 : moveDir.dr===1?2 : 3;

                let canMove = true;
                if (cell.walls[wallIdx]) {
                    // Check if player is hitting the edge of the current tile
                    if (moveDir.dc === 1 && nextX > (currentC + 1) * cellSize - b) canMove = false;
                    if (moveDir.dc === -1 && nextX < currentC * cellSize + b) canMove = false;
                    if (moveDir.dr === 1 && nextY > (currentR + 1) * cellSize - b) canMove = false;
                    if (moveDir.dr === -1 && nextY < currentR * cellSize + b) canMove = false;
                }

                if (canMove) {
                    p.x = nextX;
                    p.y = nextY;
                }

                // Check Win
                if (currentR === goal.r && currentC === goal.c) {
                    level++;
                    setup();
                }
            }
            draw();
            drawMinimap();
            requestAnimationFrame(moveTick);
        }

        function drawMinimap() {
            mCtx.fillStyle = "#000"; mCtx.fillRect(0,0,80,80);
            let mSize = 80 / cols;
            mCtx.strokeStyle = "#0044aa"; mCtx.lineWidth = 0.5;
            grid.forEach(c => {
                let x = c.c*mSize, y = c.r*mSize;
                if(c.walls[0]) mLine(x,y,x+mSize,y);
                if(c.walls[1]) mLine(x+mSize,y,x+mSize,y+mSize);
                if(c.walls[2]) mLine(x+mSize,y+mSize,x,y+mSize);
                if(c.walls[3]) mLine(x,y+mSize,x,y);
            });
            // Player on minimap
            mCtx.fillStyle = "#fff";
            mCtx.fillRect((p.x/canvas.width)*80 - 1, (p.y/canvas.height)*80 - 1, 2, 2);
        }

        function draw() {
            ctx.fillStyle = "#000"; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.strokeStyle = "#0066ff"; ctx.lineWidth = Math.max(1.5, 4 - level/4);
            grid.forEach(c => {
                let x = c.c*cellSize, y = c.r*cellSize;
                if(c.walls[0]) line(x,y,x+cellSize,y); if(c.walls[1]) line(x+cellSize,y,x+cellSize,y+cellSize);
                if(c.walls[2]) line(x+cellSize,y+cellSize,x,y+cellSize); if(c.walls[3]) line(x,y+cellSize,x,y);
            });
            ctx.fillStyle = "#ffde00"; ctx.fillRect(goal.c*cellSize+cellSize*0.25, goal.r*cellSize+cellSize*0.25, cellSize*0.5, cellSize*0.5);
            ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(p.x, p.y, cellSize*0.3, 0, 7); ctx.fill();
        }

        function line(x1,y1,x2,y2){ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();}
        function mLine(x1,y1,x2,y2){mCtx.beginPath();mCtx.moveTo(x1,y1);mCtx.lineTo(x2,y2);mCtx.stroke();}

        setup();
        moveTick();
    </script>
</body>
</html>
